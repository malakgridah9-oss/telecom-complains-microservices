server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    compatibility-verifier:
      enabled: false

    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        - id: admin-service
          uri: lb://authent-service
          predicates:
            - Path=/api/admin/**

        - id: auth-service
          uri: lb://authent-service
          predicates:
            - Path=/api/auth/**

        - id: user-service
          uri: lb://authent-service
          predicates:
            - Path=/api/users/**

        - id: ticket-service
          uri: lb://ticket-service
          predicates:
            - Path=/api/tickets/**

        - id: contract-service
          uri: lb://contract-service
          predicates:
            - Path=/api/contracts/**

        - id: service-contract
          uri: lb://contract-service
          predicates:
            - Path=/api/services/**

        - id: customer-service
          uri: lb://customer-service
          predicates:
            - Path=/api/customers/**

        - id: account-service
          uri: lb://customer-service
          predicates:
            - Path=/api/accounts/**

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

jwt:
  secret: telecom-secret-key-2024-very-long-secret-key-for-security

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    org.springframework.cloud.gateway: DEBUG