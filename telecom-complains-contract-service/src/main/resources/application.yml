server:
  port: 8082

spring:
  application:
    name: contract-service
  datasource:
    url: jdbc:mysql://localhost:3306/telecom_ticketing
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

management:
  endpoints:
    web:
      exposure:
        include: "*"