server:
  port: 8084

spring:
  application:
    name: authent-service
  datasource:
    url: jdbc:mysql://localhost:3306/telecom_ticketing
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: telecom-secret-key-2024-very-long-secret-key-for-security
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: "*"